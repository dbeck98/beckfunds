<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beck Investment Group — Built for More</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:      #B8960C;
    --gold-lt:   #D4AE2A;
    --gold-dim:  #7A6208;
    --dark:      #0E0E0E;
    --dark-mid:  #1A1A1A;
    --dark-card: #141414;
    --off-white: #F0E8D0;
    --muted:     #888880;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: var(--off-white);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url(<img src="Classic_Banking_Seal_with_Gold__BIG_.svg" alt="Beck Investment Group Logo"/>
    pointer-events: none;
    z-index: 100;
  }

  /* ── Ambient glow ── */
  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,150,12,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }

  /* ── Logo mark ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  }

  .logo-svg {
    width: clamp(220px, 40vw, 360px);
    height: auto;
    margin-bottom: 32px;
  }

  /* ── Wordmark ── */
  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(11px, 1.8vw, 15px);
    letter-spacing: 0.42em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }

  /* ── Rule ── */
  .rule {
    width: clamp(180px, 30vw, 300px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 22px auto;
    opacity: 0;
    animation: fadeIn 1.4s ease 0.8s forwards;
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 3.5vw, 28px);
    color: var(--off-white);
    text-align: center;
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
  }

  /* ── Coming soon block ── */
  .soon-block {
    margin-top: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 1.3s forwards;
  }

  .soon-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── Divider dots ── */
  .dots {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold-dim);
  }
  .dot.active {
    background: var(--gold);
    width: 6px; height: 6px;
  }

  /* ── Contact line ── */
  .contact {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(11px, 1.6vw, 13px);
    letter-spacing: 0.18em;
    color: var(--muted);
    text-align: center;
  }
  .contact a {
    color: var(--gold);
    text-decoration: none;
    transition: color 0.3s ease;
    letter-spacing: 0.18em;
  }
  .contact a:hover { color: var(--gold-lt); }

  /* ── Fund name pill ── */
  .fund-pill {
    border: 1px solid var(--gold-dim);
    padding: 8px 22px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(12px, 1.8vw, 14px);
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1.4s ease 1.6s forwards;
  }

  /* ── Bottom rule ── */
  .bottom-rule {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 30%, var(--gold) 50%, var(--gold-dim) 70%, transparent 100%);
    opacity: 0;
    animation: fadeIn 2s ease 2s forwards;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Gold shimmer on cross ── */
  @keyframes shimmer {
    0%   { opacity: 0.6; }
    50%  { opacity: 1; }
    100% { opacity: 0.6; }
  }
  .cross-sheen { animation: shimmer 4s ease-in-out infinite; }

</style>
</head>
<body>

<div class="glow"></div>

<main class="page">

  <!-- Logo mark -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 360 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="crossV" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#F0D855"/>
          <stop offset="18%"  stop-color="#C89008"/>
          <stop offset="42%"  stop-color="#EAB818"/>
          <stop offset="68%"  stop-color="#9A6C04"/>
          <stop offset="100%" stop-color="#C8980C"/>
        </linearGradient>
        <linearGradient id="crossH" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#C89008"/>
          <stop offset="28%"  stop-color="#F0D060"/>
          <stop offset="52%"  stop-color="#B8820A"/>
          <stop offset="78%"  stop-color="#EAB818"/>
          <stop offset="100%" stop-color="#9A6C04"/>
        </linearGradient>
        <linearGradient id="sheenV" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
          <stop offset="45%"  stop-color="white" stop-opacity="0"/>
          <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
        </linearGradient>
        <linearGradient id="sheenH" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="white" stop-opacity="0"/>
          <stop offset="38%"  stop-color="white" stop-opacity="0.32"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- Cross: center x=180, bottom=222, height=196, top=26 -->
      <!-- Vertical beam -->
      <rect x="168" y="26" width="24" height="196" rx="1" fill="url(#crossV)"/>
      <!-- Vertical sheen -->
      <rect x="171" y="26" width="7" height="196" rx="1" fill="url(#sheenV)" class="cross-sheen"/>
      <!-- Depth lines vertical -->
      <line x1="168" y1="26" x2="168" y2="222" stroke="#4A3000" stroke-width="0.8" opacity="0.55"/>
      <line x1="192" y1="26" x2="192" y2="222" stroke="#4A3000" stroke-width="0.6" opacity="0.3"/>

      <!-- Horizontal beam: y=76, height=22 -->
      <rect x="112" y="76" width="136" height="22" rx="1" fill="url(#crossH)"/>
      <!-- Horizontal sheen -->
      <rect x="112" y="77" width="136" height="8" rx="1" fill="url(#sheenH)" class="cross-sheen"/>
      <!-- Depth line horizontal -->
      <line x1="112" y1="98" x2="248" y2="98" stroke="#4A3000" stroke-width="0.6" opacity="0.35"/>

      <!-- B — text-anchor end flush to cross left edge x=168 -->
      <text x="164" y="222"
        font-family="'Cormorant Garamond', 'Didot', 'Bodoni MT', Georgia, serif"
        font-size="148" font-weight="700"
        fill="#F0E8D0"
        text-anchor="end"
        dominant-baseline="auto">B</text>

      <!-- G — text-anchor start flush to cross right edge x=192 -->
      <text x="196" y="222"
        font-family="'Cormorant Garamond', 'Didot', 'Bodoni MT', Georgia, serif"
        font-size="148" font-weight="700"
        fill="#F0E8D0"
        text-anchor="start"
        dominant-baseline="auto">G</text>

    </svg>

    <!-- Wordmark -->
    <div class="wordmark">Beck Investment Group</div>

    <!-- Rule -->
    <div class="rule"></div>

    <!-- Tagline -->
    <div class="tagline">Built for More.</div>

  </div>

  <!-- Coming soon block -->
  <div class="soon-block">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
    <div class="soon-label">Launching 2026</div>
    <div class="contact">
      Inquiries &nbsp;—&nbsp; <a href="mailto:dillon@beckfunds.com">dillon@beckfunds.com</a>
    </div>
  </div>

  <!-- Fund pill -->
  <div class="fund-pill" style="margin-top: 44px;">
    BIG Growth Fund I, LP &nbsp;·&nbsp; Texas Hill Country
  </div>

</main>

<div class="bottom-rule"></div>

</body>
</html>
